global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finqa-bot-api"
    static_configs:
      - targets: ["api:8001"]
    metrics_path: /metrics

  - job_name: "vllm"
    static_configs:
      - targets: ["vllm:8000"]
    metrics_path: /metrics

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
